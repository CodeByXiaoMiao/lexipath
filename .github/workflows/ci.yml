name: CI

on:
  push:
    branches: [main, "bootstrap/**"]
  pull_request:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Format workspace
        run: cargo fmt --all
      - name: Test
        shell: pwsh
        run: |
          & cargo test --all-targets 2>&1 | Tee-Object -FilePath test.log
          exit $LASTEXITCODE
      - name: Release check
        shell: pwsh
        run: |
          & cargo check --release 2>&1 | Tee-Object -FilePath release-check.log
          exit $LASTEXITCODE
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-ci-diagnostics
          path: |
            test.log
            release-check.log
          if-no-files-found: warn

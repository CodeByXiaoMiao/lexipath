name: v0.10.4 runnable

on:
  push:
    branches:
      - fix/v0.10.4-from-bootstrap-mvp
  pull_request:
    branches:
      - bootstrap/mvp
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build real Rust egui release
        shell: pwsh
        run: |
          cargo build --release 2>&1 | Tee-Object -FilePath build.log
          exit $LASTEXITCODE
      - name: Prepare runnable package
        if: success()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force package/data | Out-Null
          Copy-Item target/release/lexipath.exe package/LexiPath.exe
          @'{
            "enable_transparent_mode": false,
            "enable_hover_show_hide": false,
            "visible_opacity_percent": 85
          }
          '@ | Set-Content -Encoding UTF8 package/data/settings.json
          @'
          LexiPath v0.10.4

          This package is built from the real Rust/egui project on the fix/v0.10.4-from-bootstrap-mvp branch.
          Extract to a new folder and run LexiPath.exe.
          '@ | Set-Content -Encoding UTF8 package/README.txt
          Compress-Archive -Path package/* -DestinationPath LexiPath-Windows-x64-v0.10.4-real.zip -Force
      - name: Upload runnable package
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: LexiPath-Windows-x64-v0.10.4-real
          path: LexiPath-Windows-x64-v0.10.4-real.zip
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v0104-build-log
          path: build.log
          if-no-files-found: warn

name: build real Windows package

on:
  pull_request:
    branches:
      - bootstrap/mvp
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build release
        shell: pwsh
        run: |
          cargo build --release 2>&1 | Tee-Object -FilePath build.log
          exit $LASTEXITCODE
      - name: Package executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force package/data | Out-Null
          Copy-Item target/release/lexipath.exe package/LexiPath.exe
          $settings = [ordered]@{
            enable_transparent_mode = $false
            enable_hover_show_hide = $false
            visible_opacity_percent = 85
          } | ConvertTo-Json
          $settings | Set-Content -Encoding UTF8 package/data/settings.json
          "LexiPath real Rust egui build" | Set-Content -Encoding UTF8 package/README.txt
          Compress-Archive -Path package/* -DestinationPath LexiPath-Windows-x64-real.zip -Force
      - name: Upload executable package
        uses: actions/upload-artifact@v4
        with:
          name: LexiPath-Windows-x64-real
          path: LexiPath-Windows-x64-real.zip
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real-windows-build-log
          path: build.log
          if-no-files-found: warn

name: AI course review

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/**"
      - "assets/**"
      - "tools/ai_course_review.py"
      - "Cargo.toml"
      - ".github/workflows/ai-course-review.yml"
  push:
    branches: ["bootstrap/**"]
    paths:
      - "src/**"
      - "assets/**"
      - "tools/ai_course_review.py"
      - "Cargo.toml"
      - ".github/workflows/ai-course-review.yml"

permissions:
  contents: read
  models: read

jobs:
  review:
    runs-on: windows-latest
    steps:
      - name: Checkout LexiPath
        uses: actions/checkout@v4
        with:
          path: lexipath

      - name: Checkout Ogden word list
        uses: actions/checkout@v4
        with:
          repository: ChristopherA/iambic-mnemonic
          path: sources/ogden

      - name: Checkout CEFR word list
        uses: actions/checkout@v4
        with:
          repository: Kolia951/The_Oxford_3000_CEFR
          path: sources/oxford

      - name: Checkout ECDICT
        uses: actions/checkout@v4
        with:
          repository: skywind3000/ECDICT
          path: sources/ecdict

      - name: Merge reviewed dictionary supplements
        shell: pwsh
        run: |
          $dictionary = "sources/ecdict/ecdict.csv"
          $headers = (Get-Content $dictionary -TotalCount 1) -split ','
          Get-ChildItem "lexipath/assets/*-entry.json" | ForEach-Object {
            $entry = Get-Content $_.FullName -Raw | ConvertFrom-Json
            $record = [ordered]@{}
            foreach ($header in $headers) { $record[$header] = "" }
            $record["word"] = $entry.word
            $record["phonetic"] = $entry.phonetic
            $record["translation"] = $entry.meaning
            $record["pos"] = $entry.part_of_speech
            $record["bnc"] = "900000"
            $record["frq"] = "900000"
            [pscustomobject]$record |
              ConvertTo-Csv -NoTypeInformation |
              Select-Object -Skip 1 |
              Add-Content $dictionary -Encoding utf8
          }

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Repair derived phonetics
        working-directory: lexipath
        shell: pwsh
        run: |
          & cargo run --release -- `
            --repair-dictionary `
            --ogden ../sources/ogden/word-lists/basic-english-850.txt `
            --word-list ../sources/oxford/package.txt `
            --input ../sources/ecdict/ecdict.csv `
            --output dictionary-repairs.csv
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Get-Content dictionary-repairs.csv |
            Select-Object -Skip 1 |
            Add-Content ../sources/ecdict/ecdict.csv -Encoding utf8

      - name: Generate complete raw course
        working-directory: lexipath
        run: >-
          cargo run --release --
          --import-catalog
          --ogden ../sources/ogden/word-lists/basic-english-850.txt
          --word-list ../sources/oxford/package.txt
          --dictionary ../sources/ecdict/ecdict.csv
          --output raw-course.json

      - name: Finalize course for review
        working-directory: lexipath
        run: >-
          cargo run --release --
          --finalize-catalog
          --input raw-course.json
          --output course.json

      - name: Review every finalized lesson with AI
        working-directory: lexipath
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python tools/ai_course_review.py course.json

      - name: Upload AI review report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-course-review
          path: |
            lexipath/ai-course-review.json
            lexipath/ai-course-review.md
          if-no-files-found: warn
